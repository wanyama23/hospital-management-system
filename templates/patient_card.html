<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Card | MediCore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .card-container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    .card-container h2 {
      margin-bottom: 20px;
    }
    .card-details p {
      margin: 5px 0;
      font-size: 1.1em;
    }


  body { background-color: #f8f9fa; }
  .card-container {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
  }
  .card-container h2 {
    margin-bottom: 20px;
  }
  .card-details p {
    margin: 5px 0;
    font-size: 1.1em;
  }

  /* Print styles */
  @media print {
    /* Hide buttons and links when printing */
    button, a {
      display: none !important;
    }

    /* Optional: remove background color for clean print */
    body {
      background-color: white !important;
    }

    /* Optional: make text larger for readability */
    .card-details p {
      font-size: 1.2em;
    }
  }


  </style>
</head>
<body>
  <div class="card-container">
    <h2>Patient Card</h2>

    <!-- Patient details -->
    <div class="card-details">
      <p><strong>Name:</strong> {{ full_name }}</p>
      <p><strong>MRN:</strong> {{ mrn }}</p>
      <p><strong>Card Number:</strong> {{ card_number }}</p>
      <p><strong>Patient ID:</strong> {{ patient_id }}</p>
    </div>

    <!-- Print button -->
    <button class="btn btn-primary mt-3" onclick="window.print()">Print Card</button>

    <!-- Send to Doctor Queue -->
    <form method="POST" action="{{ url_for('send_to_doctor') }}" class="mt-3">
      <input type="hidden" name="patient_id" value="{{ patient_id }}">
      <button type="submit" class="btn btn-success">Send to Doctor</button>
    </form>

    <!-- Back to Registration -->
    <a href="{{ url_for('register') }}" class="btn btn-secondary mt-3">Register Another Patient</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
