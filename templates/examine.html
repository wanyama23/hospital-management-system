<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Examine Patient | MediCore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }
    .panel {
      background-color: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    .form-label {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold">Examine Patient</h2>
      <span class="text-muted">{{ current_date }}</span>
    </div>

    <div class="panel">
      <h5 class="mb-3">Patient: {{ patient.first_name }} {{ patient.last_name }}</h5>

      <!-- Main Examination Form -->
      <form method="POST" action="{{ url_for('examine', patient_id=patient.id) }}">
        
        <!-- Symptoms -->
        <div class="mb-3">
          <label for="symptoms" class="form-label">Symptoms</label>
          <textarea class="form-control" id="symptoms" name="symptoms" rows="3" 
                    placeholder="Enter patient symptoms">{{ patient.symptoms or '' }}</textarea>
        </div>

        <!-- Diagnosis -->
        <div class="mb-3">
          <label for="diagnosis" class="form-label">Diagnosis</label>
          <textarea class="form-control" id="diagnosis" name="diagnosis" rows="3" 
                    placeholder="Enter diagnosis">{{ patient.diagnosis or '' }}</textarea>
        </div>

        <!-- Prescriptions Dropdown -->
         <!-- Prescriptions -->
<div class="mb-3">
  <label class="form-label">Prescriptions</label>
  <div id="prescriptions-container">
    <!-- Initial prescription row -->
    <div class="row mb-2 prescription-row">
      <div class="col-md-6">
        <!-- select -->
<select class="form-select medicine-select" name="medicine_ids" required>
  <option value=""> -- Select Medicine -- </option>
  {% for med in medicines %}
  <option value="{{ med.id }}" data-price="{{ med.unit_price }}">
    {{ med.name }} (KES {{ med.unit_price }})
  </option>
  {% endfor %}
</select>

<!-- quantity -->
<input type="number" class="form-control quantity-input" name="quantities" min="1" value="1" required>

        <!-- <select class="form-select medicine-select" name="medicine_ids[]" required>
          <option value="">-- Select Medicine --</option>
          {% for med in medicines %}
            <option value="{{ med.id }}" data-price="{{ med.unit_price }}">
              {{ med.name }} (KES {{ med.unit_price }})
            </option>
          {% endfor %}
        </select> -->
      </div>
      <div class="col-md-3">
        <input type="number" class="form-control quantity-input" name="quantities[]" min="1" value="1" required>
      </div>
      <div class="col-md-3">
        <button type="button" class="btn btn-danger remove-row">Remove</button>
      </div>
    </div>
  </div>
  <button type="button" class="btn btn-secondary mt-2" id="add-prescription">+ Add Medicine</button>
</div>

<!-- Hidden billing amount field -->
<input type="hidden" id="billing_amount" name="billing_amount">
<p><strong>Total Bill:</strong> KES <span id="billing_display">0</span></p>

        <!-- <div class="mb-3">
          <label for="prescriptions" class="form-label">Prescriptions</label>
          <select class="form-select" id="prescriptions" name="prescriptions" required>
            <option value="">-- Select Medicine --</option>
            {% for med in medicines %}
              <option value="{{ med.id }}" data-price="{{ med.unit_price }}">
                {{ med.name }} (KES {{ med.unit_price }})
              </option>
            {% endfor %}
          </select>
        </div> -->

        <!-- Hidden billing amount field -->
        <input type="hidden" id="billing_amount" name="billing_amount">

        <!-- Lab Tests -->
        <div class="mb-3">
          <label for="tests" class="form-label">Lab Tests</label>
          <input type="text" class="form-control" id="tests" name="tests" 
                 placeholder="Enter lab test(s) if required" value="{{ patient.tests_ordered or '' }}">
          <small class="text-muted">Leave blank if no lab test is required.</small>
        </div>

        <!-- Save Button -->
        <div class="d-flex justify-content-between mt-4">
          <a href="{{ url_for('doctor') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back
          </a>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save me-2"></i>Save & Continue
          </button>
        </div>
      </form>

      <!-- Quick Workflow Buttons -->
      <hr class="my-4">
      <div class="d-flex justify-content-center gap-3">
        <a href="{{ url_for('order_lab_test') }}?patient_id={{ patient.id }}" 
           class="btn btn-outline-info">
          <i class="fas fa-flask me-2"></i>Send to Lab
        </a>
        <a href="{{ url_for('send_to_pharmacy', patient_id=patient.id) }}" 
   class="btn btn-outline-success">
   <i class="fas fa-pills me-2"></i>Send to Pharmacy
</a>

        <!-- <a href="{{ url_for('send_to_pharmacy', patient_id=patient.id) }}" 
           class="btn btn-outline-success">
          <i class="fas fa-pills me-2"></i>Send to Pharmacy
        </a> -->
        <a href="{{ url_for('prescription_pdf', patient_id=patient.id) }}" 
           class="btn btn-outline-dark">
          <i class="fas fa-file-medical me-2"></i>Print Report
        </a>
        <!-- New Admit Button -->
        <button type="button" class="btn btn-outline-danger" data-bs-toggle="modal" data-bs-target="#admitModal">
          <i class="fas fa-bed me-2"></i>Admit Patient
        </button>
        <!-- Send to Labor Ward Button -->
        <a href="{{ url_for('admit_to_labor', patient_id=patient.id) }}" 
           class="btn btn-outline-danger">
          <i class="fas fa-baby me-2"></i>Send to Labor Ward
        </a>
      </div>
    </div>
  </div>

  <!-- Admit Patient Modal -->
  <div class="modal fade" id="admitModal" tabindex="-1" aria-labelledby="admitModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form method="POST" action="{{ url_for('admit_from_exam', patient_id=patient.id) }}">
          <div class="modal-header">
            <h5 class="modal-title" id="admitModalLabel">Admit Patient</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <!-- Ward Selection -->
            <div class="mb-3">
              <label for="ward" class="form-label">Ward</label>
              <select class="form-select" id="ward" name="ward" required>
                <option value="">-- Select Ward --</option>
                <option value="General">General</option>
                <option value="Surgical">Surgical</option>
                <option value="Maternity">Maternity</option>
                <option value="Pediatrics">Pediatrics</option>
              </select>
            </div>

            <!-- Bed Selection -->
            <div class="mb-3">
              <label for="bed_number" class="form-label">Bed</label>
              <select class="form-select" id="bed_number" name="bed_number" required>
                {% for bed in available_beds %}
                  <option value="{{ bed.bed_number }}" data-ward="{{ bed.ward }}">
                    {{ bed.bed_number }} ({{ bed.ward }})
                  </option>
                {% endfor %}
              </select>
            </div>

            <!-- Reason -->
            <div class="mb-3">
              <label for="reason" class="form-label">Reason</label>
              <textarea class="form-control" id="reason" name="reason" rows="2" placeholder="Reason for admission"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-danger">Admit</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Dynamic Filtering Script -->
  <script>
  document.addEventListener("DOMContentLoaded", function() {
    const wardSelect = document.getElementById("ward");
    const bedSelect = document.getElementById("bed_number");

    function filterBeds() {
      const selectedWard = wardSelect.value;
      for (let option of bedSelect.options) {
        if (!selectedWard || option.dataset.ward === selectedWard) {
          option.style.display = "block";
        } else {
          option.style.display = "none";
        }
      }
      bedSelect.value = "";
    }

    wardSelect.addEventListener("change", filterBeds);

    // ✅ Auto-fill billing amount when medicine selected
    const prescriptionSelect = document.getElementById("prescriptions");
    const billingInput = document.getElementById("billing_amount");

    prescriptionSelect.addEventListener("change", function() {
      const selectedOption = prescriptionSelect.options[prescriptionSelect.selectedIndex];
      if (selectedOption && selectedOption.dataset.price) {
        billingInput.value = selectedOption.dataset.price;
      } else {
        billingInput.value = "";
      }
    });
  });
  

document.addEventListener("DOMContentLoaded", function() {
  const container = document.getElementById("prescriptions-container");
  const addBtn = document.getElementById("add-prescription");
  const billingInput = document.getElementById("billing_amount");
  const billingDisplay = document.getElementById("billing_display");

  function updateTotal() {
    let total = 0;
    document.querySelectorAll(".prescription-row").forEach(row => {
      const select = row.querySelector(".medicine-select");
      const qtyInput = row.querySelector(".quantity-input");
      const price = select.options[select.selectedIndex]?.dataset.price || 0;
      const qty = qtyInput.value || 0;
      total += parseFloat(price) * parseInt(qty);
    });
    billingInput.value = total;
    billingDisplay.textContent = total;
  }

  // Add new row
  addBtn.addEventListener("click", function() {
    const newRow = container.querySelector(".prescription-row").cloneNode(true);
    newRow.querySelector(".medicine-select").value = "";
    newRow.querySelector(".quantity-input").value = 1;
    container.appendChild(newRow);
    attachEvents(newRow);
  });

  // Attach events to row
  function attachEvents(row) {
    row.querySelector(".medicine-select").addEventListener("change", updateTotal);
    row.querySelector(".quantity-input").addEventListener("input", updateTotal);
    row.querySelector(".remove-row").addEventListener("click", function() {
      row.remove();
      updateTotal();
    });
  }

  // Attach to initial row
  document.querySelectorAll(".prescription-row").forEach(attachEvents);

  updateTotal();
});



  </script>
</body>
</html>
