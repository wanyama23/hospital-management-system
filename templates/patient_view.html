<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Patient Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <h3>Patient Details</h3>
    <dl class="row">
      <dt class="col-sm-3">Name</dt><dd class="col-sm-9">{{ patient.first_name }} {{ patient.last_name }}</dd>
      <dt class="col-sm-3">MRN</dt><dd class="col-sm-9">{{ patient.medical_record_number }}</dd>
      <dt class="col-sm-3">Status</dt><dd class="col-sm-9">{{ patient.status }}</dd>
      <dt class="col-sm-3">Symptoms</dt><dd class="col-sm-9">{{ patient.symptoms or '—' }}</dd>
      <dt class="col-sm-3">Diagnosis</dt><dd class="col-sm-9">{{ patient.diagnosis or '—' }}</dd>
    </dl>
    <a href="{{ url_for('pharmacy') }}" class="btn btn-secondary">Back to Pharmacy</a>
  </div>
</body>
</html>
